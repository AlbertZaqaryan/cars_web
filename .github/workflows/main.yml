name: Django CI/CD Pipeline to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Create Deployment Artifact (Zip Method)
      run: |
        echo "Creating deployment package..."
        # Exclude local virtual environments, git configurations, and cache files
        zip -r deploy.zip . -x "*.git*" "*venv*" "*__pycache__*" "*.env" "db.sqlite3"

    - name: Copy Zip Artifact to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        source: "deploy.zip"
        target: "/home/${{ secrets.EC2_USER }}/app/"

    - name: SSH into EC2, Install Tools, Unzip, and Launch Docker Containers
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        script: |
          # 1. System update
          sudo apt-get update -y

          # 2. Ensure unzip is installed
          if ! command -v unzip &> /dev/null; then
            echo "Installing unzip..."
            sudo apt-get install unzip -y
          fi

          # 3. Robust Docker Installation using official convenience script
          if ! command -v docker &> /dev/null; then
            echo "Docker not found. Starting installation..."
            curl -fsSL https://get.docker.com -o get-docker.sh
            sudo sh get-docker.sh
            sudo systemctl enable docker
            sudo systemctl start docker
            sudo usermod -aG docker ${{ secrets.EC2_USER }}
            rm get-docker.sh
          fi

          # 4. Install Docker Compose V2 plugin into the correct system location
          if ! docker compose version &> /dev/null; then
            echo "Installing Docker Compose CLI plugin to standard path..."
            sudo mkdir -p /usr/libexec/docker/cli-plugins/
            sudo curl -SL "https://github.com/docker/compose/releases/latest/download/docker-linux-$(uname -m)" -o /usr/libexec/docker/cli-plugins/docker-compose
            sudo chmod +x /usr/libexec/docker/cli-plugins/docker-compose
          fi

          # 5. Extract files and deploy application
          cd /home/${{ secrets.EC2_USER }}/app/
          
          echo "Extracting deploy.zip bundle..."
          unzip -o deploy.zip
          rm deploy.zip

          echo "Launching application containers..."
          # Refresh current group settings dynamically and force execution using the correct plugin path
          sudo docker compose down
          sudo docker compose up --build -d
