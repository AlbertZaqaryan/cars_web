name: Django CI/CD Pipeline to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Create Deployment Artifact (Zip Method)
      run: |
        echo "Creating deployment package..."
        zip -r deploy.zip . -x "*.git*" "*venv*" "*__pycache__*" "*.env" "db.sqlite3"

    - name: Copy Zip Artifact to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        source: "deploy.zip"
        target: "/home/${{ secrets.EC2_USER }}/app/"

    - name: SSH into EC2, Install Tools, Unzip, and Launch Docker Containers
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        script: |
          # 1. System update
          sudo apt-get update -y

          # 2. Ensure unzip is installed
          if ! command -v unzip &> /dev/null; then
            echo "Installing unzip..."
            sudo apt-get install unzip -y
          fi

          # 3. Setup Docker Repo and Plugins securely if missing
          if ! command -v docker &> /dev/null || ! docker compose version &> /dev/null; then
            echo "Setting up official Docker repository and packages..."
            sudo apt-get install -y ca-certificates curl gnupg
            sudo install -m 0755 -d /etc/apt/keyrings
            curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor --yes -o /etc/apt/keyrings/docker.gpg
            sudo chmod a+r /etc/apt/keyrings/docker.gpg

            echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
            
            sudo apt-get update -y
            sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
            
            sudo systemctl enable docker
            sudo systemctl start docker
            sudo usermod -aG docker ${{ secrets.EC2_USER }}
          fi

          # 4. Extract files sequentially (Using synchronous execution blocks)
          cd /home/${{ secrets.EC2_USER }}/app/
          echo "Extracting deploy.zip bundle..."
          
          # Force foreground completion
          sudo unzip -o deploy.zip
          sudo rm -f deploy.zip

          # 5. Navigate into the application directory
          echo "Navigating to project application directory..."
          cd core

          # Fix lowercase dockerfile reference inside docker-compose if it points to capital Dockerfile
          if [ -f dockerfile ] && [ ! -f Dockerfile ]; then
            echo "Standardizing lowercase dockerfile naming..."
            cp dockerfile Dockerfile
          fi

          echo "Launching application containers..."
          # Run using exact absolute paths to prevent environment shell profile lags
          sudo /usr/bin/docker compose down --remove-orphans
          sudo /usr/bin/docker compose up --build -d
